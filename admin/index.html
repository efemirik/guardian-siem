<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian SIEM - Command Center</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-red-500">🛡️ Guardian SIEM</h1>
            <span class="bg-green-500 text-black px-3 py-1 rounded text-sm font-bold animate-pulse">SYSTEM ACTIVE</span>
        </div>
        <div class="bg-gray-800 rounded-lg p-6 shadow-lg border border-gray-700">
            <h2 class="text-xl mb-4 border-b border-gray-700 pb-2">Live Threat Alarms</h2>
            <div hx-get="/alarms" hx-trigger="every 2s" id="alarm-container" class="space-y-3">
                <p class="text-gray-400">Loading alarms from Go engine...</p>
            </div>
        </div>
    </div>
</body>
</html>
