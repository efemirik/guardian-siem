<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guardian SIEM - Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-300 font-mono p-8 selection:bg-red-500/30">
    <div class="max-w-5xl mx-auto">
        
        <header class="flex justify-between items-end border-b border-slate-700 pb-4 mb-8">
            <div>
                <h1 class="text-2xl font-semibold text-slate-100 tracking-tight">Guardian SIEM</h1>
                <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Real-Time Threat Intelligence</p>
            </div>
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-40"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-xs text-emerald-500 font-medium tracking-wide">SYSTEM SECURE</span>
            </div>
        </header>
        
        <div class="bg-slate-800/30 rounded-lg border border-slate-700 p-6 shadow-2xl">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                Active Incidents
            </h2>
            
            <div id="alarm-container" class="space-y-3">
                <div class="text-slate-600 text-sm italic">Listening for incoming wss:// traffic...</div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('alarm-container');
        const socket = new WebSocket("ws://" + window.location.host + "/ws");

        socket.onmessage = function(event) {
            const alarms = JSON.parse(event.data);
            container.innerHTML = ''; 
            
            alarms.forEach(alarm => {
                const div = document.createElement('div');
                // Zıplama efekti kaldırıldı, yerine keskin ve oturaklı bir tasarım eklendi
                div.className = "bg-slate-800/80 border-l-4 border-red-500 p-4 rounded flex justify-between items-center";
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-red-400 font-bold text-sm tracking-widest">CRITICAL: BRUTE-FORCE</span>
                        <span class="text-slate-400 text-sm mt-1">Source IP: <span class="text-slate-200 font-medium">${alarm.ip}</span></span>
                    </div>
                    <div class="flex flex-col items-end bg-slate-900/50 px-4 py-2 rounded border border-slate-700/50">
                        <span class="text-xl font-bold text-red-500">${alarm.count}</span>
                        <span class="text-[10px] text-slate-500 uppercase tracking-wider mt-0.5">Failed Logs</span>
                    </div>
                `;
                container.appendChild(div);
            });
        };
    </script>
</body>
</html>
