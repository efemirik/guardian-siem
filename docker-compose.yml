version: '3.8'

services:
  # 1. Database for persistent log storage
  siem_postgres:
    image: postgres:15-alpine
    container_name: siem_postgres
    environment:
      POSTGRES_USER: siem_user
      POSTGRES_PASSWORD: siem_password
      POSTGRES_DB: siem_db
    ports:
      - "5432:5432"
    volumes:
      - guardian-siem_pgdata:/var/lib/postgresql/data

  # 2. In-memory store for real-time rule engine counters
  siem_redis:
    image: redis:7-alpine
    container_name: siem_redis
    ports:
      - "6379:6379"

  # 3. Message Broker for asynchronous log processing
  siem_rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: siem_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: siem_user
      RABBITMQ_DEFAULT_PASS: siem_password
    ports:
      - "5672:5672"
      - "15672:15672"

  # 4. High-throughput log ingestion API (Main Entrance)
  siem_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem_api
    ports:
      - "8080:8080"
    depends_on:
      - siem_rabbitmq
    restart: on-failure

  # 5. Cybersecurity Rule Engine (Asynchronous Worker)
  siem_worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: siem_worker
    depends_on:
      - siem_rabbitmq
      - siem_redis
    restart: on-failure

  # 6. Real-time Monitoring Command Center (HTMX Powered)
  siem_admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: siem_admin
    ports:
      - "3000:3000"
    depends_on:
      - siem_redis
    restart: on-failure

volumes:
  guardian-siem_pgdata: